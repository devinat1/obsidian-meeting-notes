services:
  pg-auth:
    image: postgres:16
    environment:
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: auth
    ports:
      - "5501:5432"
    volumes:
      - pgauth:/var/lib/postgresql/data

  pg-cal:
    image: postgres:16
    environment:
      POSTGRES_USER: calendar
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: calendar
    ports:
      - "5502:5432"
    volumes:
      - pgcal:/var/lib/postgresql/data

  pg-bot:
    image: postgres:16
    environment:
      POSTGRES_USER: bot
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: bot
    ports:
      - "5503:5432"
    volumes:
      - pgbot:/var/lib/postgresql/data

  pg-transcript:
    image: postgres:16
    environment:
      POSTGRES_USER: transcript
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: transcript
    ports:
      - "5504:5432"
    volumes:
      - pgtranscript:/var/lib/postgresql/data

  kafka:
    image: apache/kafka:4.0.2
    environment:
      KAFKA_NODE_ID: "0"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "0@localhost:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092"
      KAFKA_LOG_RETENTION_HOURS: "72"
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms512m"
      KAFKA_LOG_DIRS: "/var/kafka-logs"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    ports:
      - "9092:9092"

volumes:
  pgauth:
  pgcal:
  pgbot:
  pgtranscript:
