apiVersion: apps/v1
kind: Deployment
metadata:
  name: meeting-transcript
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: meeting-transcript
  template:
    metadata:
      labels:
        app: meeting-transcript
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: meeting-transcript
          image: {{ .Values.transcript.image.repository }}:{{ .Values.transcript.image.tag }}
          ports:
            - containerPort: {{ .Values.transcript.port }}
              name: http
          env:
            - name: PORT
              value: {{ .Values.transcript.port | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: meeting-transcript-secret
                  key: DATABASE_URL
            - name: KAFKA_BROKERS
              valueFrom:
                secretKeyRef:
                  name: meeting-transcript-secret
                  key: KAFKA_BROKERS
            - name: RECALL_REGION
              valueFrom:
                secretKeyRef:
                  name: meeting-transcript-secret
                  key: RECALL_REGION
            - name: RECALL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: meeting-transcript-secret
                  key: RECALL_API_KEY
            - name: BOT_SERVICE_INTERNAL_URL
              valueFrom:
                secretKeyRef:
                  name: meeting-transcript-secret
                  key: BOT_SERVICE_INTERNAL_URL
          resources:
            {{- toYaml .Values.transcript.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.transcript.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.transcript.port }}
            initialDelaySeconds: 15
            periodSeconds: 30
      volumes: []
